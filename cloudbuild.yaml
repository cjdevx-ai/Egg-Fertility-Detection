steps:
  # STEP 1: Build the monolith Docker image
  # This uses the Dockerfile in the root, which handles both React build and Python setup
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA',
      '.'
    ]

  # STEP 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
    ]

  # STEP 3: Deploy the image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # YOLO and ONNX Runtime perform better with more resources
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'

# Default substitutions (can be overridden in the Cloud Build Trigger)
substitutions:
  _AR_HOSTNAME: us-central1-docker.pkg.dev
  _AR_REPOSITORY: ovoscan-repo
  _SERVICE_NAME: ovoscan-ai
  _DEPLOY_REGION: us-central1

images:
  - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
